# HL7 Forge Configuration
# All values shown below are the built-in defaults.
# Uncomment and change only the settings you need.
# Environment variables (MLLP_PORT, WEB_PORT, RUST_LOG) override this file.

# [server]
# mllp_port = 2575
# web_port = 8080

# [logging]
# level = "info"
# file = "logs/hl7-forge.log" # omit or empty = no file logging
# max_size_mb = 50            # rotate when file exceeds this size
# max_files = 5               # keep at most N rotated files

# [store]
# max_messages = 10000
# max_memory_mb = 512

# [mllp]
# max_message_size_mb = 10
# read_timeout_secs = 60
# write_timeout_secs = 30
# max_connections = 100
